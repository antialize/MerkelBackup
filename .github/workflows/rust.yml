on: [push, pull_request]
name: RUST Continuous integration

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions-rust-lang/setup-rust-toolchain@v1
    - name: Deps
      run: DEBIAN_FRONTEND=noninteractive sudo apt-get install -y --no-install-recommends liblzma-dev
    - name: Check
      run: cargo check --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Format
      run: cargo fmt -- --check
    - name: Clippy
      run: cargo clippy -- --no-deps -Dwarnings
    - name: Integration tests
      run: python3 test.py

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Log in to GitHub Container Registry
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build (and push on push events)
      uses: docker/build-push-action@v6
      with:
        context: .
        push: ${{ github.event_name == 'push' }}
        tags: |
          ghcr.io/${{ github.repository_owner }}/merkelbackup:latest
          ghcr.io/${{ github.repository_owner }}/merkelbackup:${{ github.sha }}
        build-args: |
          GIT_COMMIT=${{ github.sha }}
          GIT_COMMIT_FULL=${{ github.sha }}
          GIT_BRANCH=${{ github.ref_name }}
